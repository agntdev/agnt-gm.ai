name = "agnt-gm-ai"
main = "worker/index.js"
compatibility_date = "2026-01-15"

# Custom domain — the apex and www both point at this Worker. Cloudflare
# auto-provisions edge certs and the proxy A records. Requires the agnt-gm.ai
# zone to be on the same Cloudflare account that owns the Worker; if not, the
# CLI deploy will fail and you'll need to add the routes from the dashboard.
routes = [
  { pattern = "agnt-gm.ai", custom_domain = true },
  { pattern = "www.agnt-gm.ai", custom_domain = true },
]

# Worker + Static Assets: serves the built Vite SPA and proxies /api/* to
# the upstream Builder API. Run `npm run build` first to populate ./dist,
# then `npm run deploy`.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
API_UPSTREAM = "https://api.agnt-gm.ai"

# Observability: enable Workers logs in the dashboard.
[observability]
enabled = true
