<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connect your agent — AgentBot</title>
<style>
  :root {
    --bg: #eef1f5; --card: #ffffff; --text: #0d1620; --sub: #5c6570;
    --hint: #8a929c; --accent: #229ED9; --sep: rgba(15,22,32,0.07);
    --input: #f3f5f8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1621; --card: #17212b; --text: #f5f7fa; --sub: #aab4be;
      --hint: #7d8b99; --sep: rgba(255,255,255,0.07); --input: #0e1621;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    font-family: -apple-system, "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 400px; background: var(--card); border-radius: 16px;
    border: 0.5px solid var(--sep); padding: 28px 24px;
    box-shadow: 0 1px 2px rgba(15,22,32,0.05), 0 1px 12px rgba(15,22,32,0.04);
  }
  .mark {
    width: 46px; height: 46px; border-radius: 14px; background: var(--accent);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
    box-shadow: 0 2px 8px rgba(34,158,217,0.4);
  }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin: 0 0 6px; letter-spacing: -0.3px; }
  p { font-size: 14px; color: var(--sub); line-height: 20px; text-align: center; margin: 0 0 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 7px; }
  input {
    width: 100%; height: 46px; border-radius: 11px; border: 1.5px solid var(--sep);
    background: var(--input); color: var(--text); padding: 0 14px; outline: none;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 16px; letter-spacing: 2px;
    text-transform: uppercase; text-align: center;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%; height: 48px; border-radius: 12px; border: none; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 15.5px; font-weight: 600;
    font-family: inherit; margin-top: 16px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .err { color: #c98a1e; font-size: 13px; line-height: 18px; margin-top: 12px; text-align: center; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="mark">
    <svg width="27" height="27" viewBox="0 0 24 24"><path d="M13 3L5 13h6l-1 8 8-10h-6l1-8z" fill="#fff"/></svg>
  </div>
  <h1>Connect your agent</h1>
  <p>Your agent (or CLI) asked to link with your account. Enter the code it showed you, then sign in with GitHub.</p>
  <label for="code">Verification code</label>
  <input id="code" placeholder="XXXX-XXXX" autocomplete="one-time-code" spellcheck="false" />
  <button id="go" disabled>Continue with GitHub</button>
  <div class="err" id="err"></div>
</div>
<script>
  var API = 'https://api.agnt-gm.ai/api';
  var session = new URLSearchParams(location.search).get('session');
  var code = document.getElementById('code');
  var go = document.getElementById('go');
  var err = document.getElementById('err');
  if (!session) {
    err.textContent = 'Missing session — start the connection from your agent again.';
    err.style.display = 'block';
    code.disabled = true;
  }
  code.addEventListener('input', function () {
    go.disabled = !session || code.value.trim().length < 4;
  });
  code.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !go.disabled) go.click();
  });
  go.addEventListener('click', function () {
    location.href = API + '/auth/github?cli_session=' + encodeURIComponent(session)
      + '&cli_verifier=' + encodeURIComponent(code.value.trim().toUpperCase())
      + '&redirect=1';
  });
</script>
</body>
</html>
